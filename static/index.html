<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GenAI Query Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0f0f0f;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 2rem;
      color: #ff6b35;
      margin-bottom: 8px;
    }

    p.subtitle {
      color: #888;
      margin-bottom: 40px;
      font-size: 0.95rem;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 28px;
      width: 100%;
      max-width: 750px;
      margin-bottom: 24px;
    }

    .card h2 {
      font-size: 1rem;
      color: #ff6b35;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    input[type="file"] {
      display: none;
    }

    .file-label {
      display: block;
      border: 2px dashed #333;
      border-radius: 8px;
      padding: 30px;
      text-align: center;
      cursor: pointer;
      color: #666;
      transition: all 0.2s;
    }

    .file-label:hover {
      border-color: #ff6b35;
      color: #ff6b35;
    }

    .file-label.selected {
      border-color: #ff6b35;
      color: #ff6b35;
      background: #1f1208;
    }

    button {
      background: #ff6b35;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      margin-top: 16px;
      width: 100%;
      transition: background 0.2s;
    }

    button:hover { background: #e55a25; }
    button:disabled { background: #444; cursor: not-allowed; }

    .badge {
      display: inline-block;
      background: #1f2e1a;
      color: #4caf50;
      border: 1px solid #4caf50;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.8rem;
      margin-top: 12px;
    }

    .columns-box {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .col-tag {
      background: #222;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.8rem;
      color: #aaa;
    }

    textarea, input[type="text"] {
      width: 100%;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e0e0e0;
      padding: 12px;
      font-size: 0.95rem;
      resize: vertical;
      outline: none;
      transition: border 0.2s;
    }

    textarea:focus, input[type="text"]:focus {
      border-color: #ff6b35;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .suggestion-btn {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #aaa;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      cursor: pointer;
      width: auto;
      margin-top: 0;
      transition: all 0.2s;
    }

    .suggestion-btn:hover {
      border-color: #ff6b35;
      color: #ff6b35;
      background: #1a1a1a;
    }

    .result-box {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 16px;
      margin-top: 16px;
      font-size: 0.85rem;
    }

    .result-box h3 {
      color: #ff6b35;
      margin-bottom: 10px;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .query-code {
      background: #0a0a0a;
      color: #4caf50;
      padding: 10px 14px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 0.85rem;
      word-break: break-all;
    }

    .result-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
      margin-top: 8px;
    }

    .result-table th {
      background: #222;
      color: #ff6b35;
      padding: 8px 10px;
      text-align: left;
      border-bottom: 1px solid #333;
    }

    .result-table td {
      padding: 7px 10px;
      border-bottom: 1px solid #1e1e1e;
      color: #ccc;
    }

    .result-table tr:hover td { background: #1a1a1a; }

    .insight-text {
      color: #ccc;
      line-height: 1.7;
      font-size: 0.9rem;
    }

    .loader {
      display: none;
      color: #555;
      font-size: 0.85rem;
      margin-top: 12px;
      text-align: center;
    }

    .loader.active { display: block; }

    .error-msg {
      color: #e57373;
      background: #1f1010;
      border: 1px solid #e57373;
      border-radius: 8px;
      padding: 12px;
      margin-top: 12px;
      font-size: 0.85rem;
    }

    .section-hidden { display: none; }
  </style>
  <style>
  /* Add this to your existing styles */
  .topbar-user {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .topbar-user span {
    color: #94a3b8;
    font-size: 0.9rem;
  }
  .topbar-user strong {
    color: #f1f5f9;
  }
  .logout-btn {
    padding: 0.4rem 1rem;
    background: transparent;
    border: 1.5px solid #6366f1;
    color: #6366f1;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 600;
    transition: all 0.2s;
    text-decoration: none;
  }
  .logout-btn:hover { background: #6366f1; color: white; }
</style>
</head>
<body>
  <div class="topbar-user">
    <span>👤 Logged in as <strong id="current-username">...</strong></span>
    <a href="/logout" class="logout-btn">Logout</a>
  </div>
  <h1>GenAI Query Assistant</h1>
  <p class="subtitle">Upload your Excel dataset and ask questions in plain English</p>

  <!-- UPLOAD CARD -->
  <div class="card">
    <h2>Step 1 — Upload Dataset</h2>
    <label class="file-label" id="fileLabel" for="fileInput">
      📂 Click to select your .xlsx file
    </label>
    <input type="file" id="fileInput" accept=".xlsx" />
    <button id="uploadBtn" onclick="uploadFile()">Upload File</button>
    <div id="uploadStatus"></div>
  </div>

  <!-- COLUMNS CARD -->
  <div class="card section-hidden" id="columnsCard">
    <h2>Dataset Columns</h2>
    <div class="columns-box" id="columnsBox"></div>
  </div>

  <!-- QUERY CARD -->
  <div class="card section-hidden" id="queryCard">
    <h2>Step 2 — Ask a Question</h2>

    <textarea id="questionInput" rows="3"
      placeholder="e.g. Which product generated the highest revenue?"></textarea>

    <div class="suggestions">
      <button class="suggestion-btn" onclick="setQuestion('Which product generated the highest revenue?')">Highest revenue product</button>
      <button class="suggestion-btn" onclick="setQuestion('Show top 10 customers by sales.')">Top 10 customers</button>
      <button class="suggestion-btn" onclick="setQuestion('Find records where profit is negative.')">Negative profit records</button>
      <button class="suggestion-btn" onclick="setQuestion('Which region has maximum orders?')">Max orders region</button>
      <button class="suggestion-btn" onclick="setQuestion('Display products with sales greater than 5000.')">Sales > 5000</button>
    </div>

    <button id="queryBtn" onclick="runQuery()">Ask Question</button>
    <div class="loader" id="loader">⏳ Thinking... please wait</div>
  </div>

  <!-- RESULT CARD -->
  <div class="card section-hidden" id="resultCard">
    <h2>Results</h2>
    <div id="resultContent"></div>
  </div>

  <script>
    let fileId = null;

    // FILE SELECTION DISPLAY
    document.getElementById("fileInput").addEventListener("change", function () {
      const label = document.getElementById("fileLabel");
      if (this.files[0]) {
        label.textContent = "✅ " + this.files[0].name;
        label.classList.add("selected");
      }
    });

    // UPLOAD FILE
    async function uploadFile() {
      const fileInput = document.getElementById("fileInput");
      const statusDiv = document.getElementById("uploadStatus");

      if (!fileInput.files[0]) {
        statusDiv.innerHTML = '<div class="error-msg">Please select a file first.</div>';
        return;
      }

      const btn = document.getElementById("uploadBtn");
      btn.disabled = true;
      btn.textContent = "Uploading...";
      statusDiv.innerHTML = "";

      const formData = new FormData();
      formData.append("file", fileInput.files[0]);

      try {
        const res = await fetch("/upload", { method: "POST", body: formData });
        const data = await res.json();

        if (!res.ok) throw new Error(data.detail || "Upload failed");

        fileId = data.file_id;
        statusDiv.innerHTML = `<div class="badge">✅ Uploaded: ${data.filename}</div>`;

        await loadColumns();

        document.getElementById("columnsCard").classList.remove("section-hidden");
        document.getElementById("queryCard").classList.remove("section-hidden");

      } catch (err) {
        statusDiv.innerHTML = `<div class="error-msg">❌ ${err.message}</div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = "Upload File";
      }
    }

    // LOAD COLUMNS
    async function loadColumns() {
      const res = await fetch(`/columns/${fileId}`);
      const data = await res.json();
      const box = document.getElementById("columnsBox");
      box.innerHTML = data.columns
        .map(col => `<span class="col-tag">${col}</span>`)
        .join("");
    }

    // SET SUGGESTION QUESTION
    function setQuestion(q) {
      document.getElementById("questionInput").value = q;
    }

    // RUN QUERY
    async function runQuery() {
      const question = document.getElementById("questionInput").value.trim();
      if (!question) return;
      if (!fileId) {
        alert("Please upload a file first.");
        return;
      }

      const btn = document.getElementById("queryBtn");
      const loader = document.getElementById("loader");
      const resultCard = document.getElementById("resultCard");
      const resultContent = document.getElementById("resultContent");

      btn.disabled = true;
      loader.classList.add("active");
      resultCard.classList.add("section-hidden");
      resultContent.innerHTML = "";

      try {
        const res = await fetch("/query", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ file_id: fileId, question: question })
        });

        const data = await res.json();

        if (!data.success) {
          resultContent.innerHTML = `<div class="error-msg">❌ ${data.error}</div>`;
        } else {
          resultContent.innerHTML = buildResult(data);
        }

        resultCard.classList.remove("section-hidden");
        resultCard.scrollIntoView({ behavior: "smooth" });

      } catch (err) {
        resultContent.innerHTML = `<div class="error-msg">❌ ${err.message}</div>`;
        resultCard.classList.remove("section-hidden");
      } finally {
        btn.disabled = false;
        loader.classList.remove("active");
      }
    }

    // BUILD RESULT HTML
    function buildResult(data) {
      let html = "";

      // Pandas query
      html += `
        <div class="result-box">
          <h3>Generated Pandas Query</h3>
          <div class="query-code">${data.pandas_query}</div>
        </div>`;

      // Result — try to parse as table
      html += `<div class="result-box"><h3>Query Result</h3>`;
      const table = parseTable(data.result);
      if (table) {
        html += table;
      } else {
        html += `<div class="query-code">${data.result}</div>`;
      }
      html += `</div>`;

      // Insight
      html += `
        <div class="result-box">
          <h3>💡 AI Business Insight</h3>
          <p class="insight-text">${data.insight}</p>
        </div>`;

      return html;
    }

    // PARSE RESULT STRING INTO HTML TABLE
    function parseTable(resultStr) {
      const lines = resultStr.trim().split("\n").filter(l => l.trim());
      if (lines.length < 2) return null;

      try {
        const headers = lines[0].trim().split(/\s{2,}/);
        if (headers.length < 2) return null;

        let tableHtml = '<div style="overflow-x:auto"><table class="result-table"><thead><tr>';
        headers.forEach(h => { tableHtml += `<th>${h}</th>`; });
        tableHtml += "</tr></thead><tbody>";

        for (let i = 1; i < lines.length; i++) {
          const cells = lines[i].trim().split(/\s{2,}/);
          tableHtml += "<tr>";
          cells.forEach(c => { tableHtml += `<td>${c}</td>`; });
          tableHtml += "</tr>";
        }

        tableHtml += "</tbody></table></div>";
        return tableHtml;
      } catch {
        return null;
      }
    }
  </script>
  <script>
  // Fetch current user on page load
  fetch('/me')
    .then(res => {
      if (res.status === 401) {
        window.location.href = '/login';  // redirect if session expired
      }
      return res.json();
    })
    .then(data => {
      document.getElementById('current-username').textContent = data.username;
    })
    .catch(() => window.location.href = '/login');
</script>
</body>
</html>
